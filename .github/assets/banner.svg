<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="50%" stop-color="#0c0c1a"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ccaa"/>
      <stop offset="50%" stop-color="#4d9fff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textfill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e0f0"/>
      <stop offset="100%" stop-color="#c0c0d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#4d9fff">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  <!-- Frequency bars visualization -->
  <g opacity="0.12">
    <rect x="60" y="100" width="12" height="60" rx="2" fill="url(#accent)"/>
    <rect x="80" y="70" width="12" height="90" rx="2" fill="url(#accent)"/>
    <rect x="100" y="85" width="12" height="75" rx="2" fill="url(#accent)"/>
    <rect x="120" y="50" width="12" height="110" rx="2" fill="url(#accent)"/>
    <rect x="140" y="90" width="12" height="70" rx="2" fill="url(#accent)"/>
    <rect x="160" y="65" width="12" height="95" rx="2" fill="url(#accent)"/>
    <rect x="180" y="80" width="12" height="80" rx="2" fill="url(#accent)"/>
    <rect x="200" y="110" width="12" height="50" rx="2" fill="url(#accent)"/>
  </g>
  <!-- Waveform line -->
  <path d="M680,100 Q700,60 720,100 Q740,140 760,100 Q780,60 800,100 Q820,140 840,100" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.15"/>
  <!-- Title -->
  <text x="450" y="95" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="36" font-weight="700" fill="url(#textfill)" filter="url(#glow)">MOLTamp Visualizers</text>
  <!-- Subtitle -->
  <text x="450" y="130" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#8888aa" opacity="0.7">Community audio visualizer presets</text>
  <!-- Corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="880" y1="180" x2="840" y2="180" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="880" y1="180" x2="880" y2="140" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
</svg>
